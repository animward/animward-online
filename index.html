<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#080808;font-family:'Share Tech Mono',monospace;overflow:hidden;cursor:default}
.classbar{position:fixed;top:0;left:0;right:0;background:#c0392b;color:#fff;font-size:10px;font-weight:700;letter-spacing:5px;text-align:center;padding:5px 0;z-index:100}
.gate{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:18px;padding:20px}
.codename{font-size:9px;letter-spacing:4px;color:rgba(192,57,43,0.7);margin-bottom:4px}
.title{font-size:clamp(16px,4vw,28px);letter-spacing:6px;color:#eee;text-align:center;line-height:1.3}
.subtitle{font-size:9px;letter-spacing:3px;color:rgba(0,255,65,0.4)}
.divider{width:200px;height:1px;background:rgba(0,255,65,0.1);margin:8px 0}
.field{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:8px}
.field label{font-size:8px;letter-spacing:3px;color:rgba(0,255,65,0.35)}
.field input{background:#0d0d0d;color:#00ff41;border:1px solid rgba(0,255,65,0.2);padding:10px 20px;font-family:inherit;font-size:13px;letter-spacing:2px;width:260px;text-align:center;outline:none;transition:border-color 0.2s}
.field input:focus{border-color:rgba(0,255,65,0.5)}
.btn{background:rgba(192,57,43,0.15);color:#c0392b;border:1px solid rgba(192,57,43,0.4);padding:10px 32px;font-family:inherit;font-size:10px;letter-spacing:4px;cursor:pointer;transition:all 0.2s;margin-top:4px}
.btn:hover{background:rgba(192,57,43,0.25);border-color:rgba(192,57,43,0.7)}
.status{font-size:9px;letter-spacing:2px;height:14px;transition:opacity 0.3s}
.status.denied{color:#c0392b;animation:blink 0.8s step-end 3}
.status.nominal{color:rgba(0,255,65,0.5)}
.corner{position:fixed;width:16px;height:16px;border-color:rgba(0,255,65,0.15);border-style:solid}
.tl{top:34px;left:8px;border-width:1px 0 0 1px}
.tr{top:34px;right:8px;border-width:1px 1px 0 0}
.bl{bottom:8px;left:8px;border-width:0 0 1px 1px}
.br{bottom:8px;right:8px;border-width:0 1px 1px 0}
.case{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,0.12);position:fixed;bottom:16px;left:50%;transform:translateX(-50%);white-space:nowrap}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999}
@keyframes blink{50%{opacity:0}}
</style>

<script>
function attempt(){
  const s=document.getElementById('status');
  const k=document.getElementById('key').value;
  if(!k){s.className='status denied';s.textContent='⚠ ACCESS KEY REQUIRED';setTimeout(()=>{s.className='status nominal';s.textContent='● STANDING BY'},2000);return;}
  s.className='status denied';
  s.textContent='✗ ACCESS DENIED // CREDENTIALS INVALID';
  document.getElementById('key').value='';
  setTimeout(()=>{s.className='status nominal';s.textContent='● STANDING BY'},3000);
}
document.getElementById('key').addEventListener('keydown',e=>{if(e.key==='Enter')attempt();});
</script>
